# Fails the PR if .env.example (or any generated env target) drifted
# from .env.schema. Runs in ~10s — no Docker, no LLM, just yarn.
name: env-drift-check

on:
    pull_request:
        paths:
            - '.env.schema'
            - '.env.example'
            - 'scripts/env/**'
            - 'package.json'
            - 'yarn.lock'

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: yarn
            - run: yarn install --frozen-lockfile
            - name: Regenerate from schema and diff
              run: yarn env:apply
            - name: Fail if anything changed
              run: |
                  if ! git diff --quiet; then
                      echo "::error::.env.example drifted from .env.schema."
                      echo "Run \`yarn env:apply\` locally and commit the result."
                      git --no-pager diff
                      exit 1
                  fi
