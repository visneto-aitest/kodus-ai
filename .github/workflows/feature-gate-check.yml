name: Feature Gate Snapshot Check

on:
    pull_request:
        paths:
            - "release/features.yaml"
            - "release/features-snapshot.json"
            - "scripts/feature-gate/**"
            - ".github/workflows/feature-gate-check.yml"

permissions:
    contents: read

jobs:
    snapshot-check:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6.0.2

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "yarn"

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: Verify snapshot is in sync with features.yaml
              run: yarn feature-gate:snapshot:check
