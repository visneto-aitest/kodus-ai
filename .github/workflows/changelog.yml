name: Generate Changelog

on:
    workflow_dispatch:
        inputs:
            tag:
                description: "Release tag (e.g. 2.0.11)"
                required: true

permissions:
    contents: write

jobs:
    changelog:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6.0.2
              with:
                  fetch-depth: 0

            - name: Resolve tag range window
              id: prev
              run: |
                  current_tag="${{ inputs.tag }}"

                  case "$current_tag" in
                    web-*)
                      tag_regex='^web-[0-9]+\.[0-9]+\.[0-9]+$'
                      ;;
                    selfhosted-*)
                      tag_regex='^selfhosted-[0-9]+\.[0-9]+\.[0-9]+$'
                      ;;
                    v*)
                      if echo "$current_tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
                        tag_regex='^v[0-9]+\.[0-9]+\.[0-9]+$'
                      else
                        tag_regex='^$'
                      fi
                      ;;
                    *)
                      if echo "$current_tag" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
                        tag_regex='^[0-9]+\.[0-9]+\.[0-9]+$'
                      else
                        tag_regex='^$'
                      fi
                      ;;
                  esac

                  mapfile -t tags < <(git tag --list | awk -v re="$tag_regex" '$0 ~ re' | sort -V)
                  previous_tag=""
                  for i in "${!tags[@]}"; do
                    if [ "${tags[$i]}" = "$current_tag" ] && [ "$i" -gt 0 ]; then
                      previous_tag="${tags[$((i - 1))]}"
                      break
                    fi
                  done

                  if ! git rev-parse "$current_tag^{commit}" >/dev/null 2>&1; then
                    echo "Tag not found locally: $current_tag"
                    exit 1
                  fi

                  end_date=$(git log -1 --format=%cI "$current_tag^{commit}")
                  if [ -n "$previous_tag" ]; then
                    start_date=$(git log -1 --format=%cI "$previous_tag^{commit}")
                    range_commit_count=$(git rev-list --count "${previous_tag}..${current_tag}")
                  else
                    start_date=$(date -u -d '-30 days' +%Y-%m-%dT%H:%M:%SZ)
                    range_commit_count=$(git rev-list --count --since="$start_date" "$current_tag^{commit}")
                  fi

                  echo "Resolved changelog window by tag range: ${previous_tag:-<none>}..$current_tag (regex: $tag_regex)"
                  echo "Detected commits in range/window: $range_commit_count"
                  echo "start_date=$start_date" >> "$GITHUB_OUTPUT"
                  echo "end_date=$end_date" >> "$GITHUB_OUTPUT"
                  echo "previous_tag=$previous_tag" >> "$GITHUB_OUTPUT"
                  echo "range_commit_count=$range_commit_count" >> "$GITHUB_OUTPUT"
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Generate changelog
              run: |
                  previous_tag="${{ steps.prev.outputs.previous_tag }}"
                  range_commit_count="${{ steps.prev.outputs.range_commit_count }}"
                  current_tag="${{ inputs.tag }}"
                  if [ -z "$previous_tag" ]; then
                    previous_tag="<none>"
                  fi
                  echo "Using tag range: $previous_tag..$current_tag"
                  echo "Using window: ${{ steps.prev.outputs.start_date }} -> ${{ steps.prev.outputs.end_date }}"
                  echo "Detected commits in range/window: $range_commit_count"
                  http_code=$(curl -s -o response.json -w "%{http_code}" -X POST "${{ secrets.CHANGELOG_API_URL }}/api/v1/changelog" \
                    -H "Content-Type: application/json" \
                    -d '{
                      "owner": "${{ github.repository_owner }}",
                      "repo": "${{ github.event.repository.name }}",
                      "startDate": "${{ steps.prev.outputs.start_date }}",
                      "endDate": "${{ steps.prev.outputs.end_date }}",
                      "style": "Write for end-users — no technical details, keep it clear and meaningful. Group related changes into a single item when they are part of the same improvement. Categorize into: New Features, Improvements, Bug Fixes, Chore / DevEx. Only include a category if it has items. Only include changes that were actually released.",
                      "webhookUrl": "${{ secrets.WEBHOOK_URL }}",
                      "version": "${{ inputs.tag }}"
                    }')
                  echo "HTTP status: $http_code"
                  echo "Response:"
                  cat response.json
                  if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
                    echo "Changelog API returned HTTP $http_code"
                    exit 1
                  fi

                  changelog_text=$(jq -r '.changelog // ""' response.json)
                  if [ -z "$(echo "$changelog_text" | tr -d '[:space:]')" ]; then
                    if [ "${range_commit_count:-0}" -gt 0 ]; then
                      echo "Error: API returned an empty changelog, but there are $range_commit_count commits in range/window."
                      if [ "$previous_tag" != "<none>" ]; then
                        echo "--- Commits in range ($previous_tag..$current_tag) ---"
                        git log --oneline "${previous_tag}..${current_tag}" | head -n 30
                      else
                        echo "--- Recent commits up to $current_tag ---"
                        git log --oneline --since="${{ steps.prev.outputs.start_date }}" "$current_tag^{commit}" | head -n 30
                      fi
                      exit 1
                    fi
                    changelog_text="## No changes in this release\n\nNo code changes were detected in the resolved tag range/window."
                  fi

                  printf "%s\n" "$changelog_text" > changelog.md
                  echo "--- Changelog content ---"
                  cat changelog.md

            - name: Update release notes
              run: |
                  gh release edit ${{ inputs.tag }} \
                    -R ${{ github.repository }} \
                    --notes-file changelog.md
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
