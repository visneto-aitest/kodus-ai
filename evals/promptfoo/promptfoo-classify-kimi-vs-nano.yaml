description: "Classifier eval - Kimi K2.5 vs GPT 5.4 nano (medium reasoning)"

providers:
  - id: openrouter:moonshotai/kimi-k2.5
    label: kimi-k2.5
    config:
      temperature: 0
      max_tokens: 1024
  - id: openai:responses:gpt-5.4-nano
    label: gpt5.4-nano-medium
    config:
      temperature: 0
      max_output_tokens: 4096
      reasoning:
        effort: medium
  - id: openai:responses:gpt-5.4-mini
    label: gpt5.4-mini-medium
    config:
      temperature: 0
      max_output_tokens: 4096
      reasoning:
        effort: medium

prompts:
  - id: "v5-xml"
    raw: |
      <LevelClassifier>
        <Context>Each finding was already confirmed by an expert code review agent. Your job is ONLY to classify — not to question validity.</Context>
        <Definitions>
          <Level name="issue">The code has a defect that causes wrong behavior in at least one scenario. The code does something INCORRECT — produces wrong output, crashes, corrupts data, or creates a security vulnerability that can be exploited.</Level>
          <Level name="warning">The code is CORRECT in all scenarios but suboptimal. The ONLY problems are: speed, memory usage, code style, readability, or missing best practices. No user will ever experience wrong behavior.</Level>
        </Definitions>
        <DecisionRule>If the finding describes something that CAN cause wrong behavior (even rarely, under concurrency, with edge-case inputs, or in specific configurations) → issue. If the finding ONLY describes "this could be faster/cleaner/more secure as a hardening measure" → warning.</DecisionRule>
        <Finding>{{finding}}</Finding>
      </LevelClassifier>
      Respond with ONLY valid JSON (no markdown, no code blocks): {"classifications": [{"index": 0, "level": "issue or warning"}]}

  - id: "v6-fewshot"
    raw: |
      <LevelClassifier>
        <Context>Each finding was already confirmed by an expert code review agent. Your job is ONLY to classify — not to question validity.</Context>
        <Definitions>
          <Level name="issue">The code produces WRONG results, crashes, or corrupts data in at least one scenario that a user or caller can trigger.</Level>
          <Level name="warning">The code produces CORRECT results in ALL scenarios. The finding is about making it faster, cleaner, or adding a defense layer that doesn't fix incorrect behavior.</Level>
        </Definitions>
        <DecisionRule>Ask: "If I deploy this code as-is, will any user/request/operation get an INCORRECT result, crash, or lose data?" YES → issue. NO → warning. Missing hardening (rate limiting, input bounds, entropy, indexes) is NOT broken behavior — it is a missing defense layer.</DecisionRule>
        <Examples>
          <Example input="Cache returns stale denial after permission grant" level="issue" reason="Users get WRONG access decisions" />
          <Example input="Race condition allows concurrent builds causing file corruption" level="issue" reason="CORRUPTED output under concurrency" />
          <Example input="Missing rate limiting on endpoint allows brute force" level="warning" reason="Every request gets CORRECT response — defense-in-depth" />
          <Example input="Unbounded limit parameter allows large result sets" level="warning" reason="Returns CORRECT data — resource protection" />
          <Example input="N+1 query fetches individually instead of batch" level="warning" reason="CORRECT results, just slower" />
        </Examples>
        <Finding>{{finding}}</Finding>
      </LevelClassifier>
      Respond with ONLY valid JSON (no markdown, no code blocks): {"classifications": [{"index": 0, "level": "issue or warning"}]}

defaultTest:
  options:
    transformOutput: "output.replace(/```json\\n?/g, '').replace(/```\\n?/g, '').trim()"

tests: file://datasets/classify-level-cases.json

outputPath: results/classify-kimi-vs-nano.json
